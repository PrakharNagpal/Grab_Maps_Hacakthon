<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendship Radius</title>

  <link rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #map-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    /* Transparent overlay for click-to-place. Same z-index as map but
       later in DOM so it paints above the map canvas and below Flutter. */
    #click-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      cursor: crosshair;
    }
    #flutter-view {
      position: absolute;
      top: 0;
      left: 0;
      width: min(460px, 34vw);
      height: 100vh;
      z-index: 2;
      pointer-events: auto;
    }
    @media (max-width: 980px) {
      #flutter-view {
        width: min(100vw, 520px);
      }
    }
  </style>
</head>
<body>
  <!-- GrabMaps renders here BEHIND Flutter -->
  <div id="map-container"></div>

  <!-- Transparent overlay that captures clicks when add-friend mode is active.
       z-index: 0, after map-container in DOM → above map, below Flutter panel. -->
  <div id="click-overlay"></div>

  <!-- Flutter renders here ON TOP with transparent background -->
  <div id="flutter-view"></div>

  <!-- GrabMaps SDK -->
  <script type="module">
    try {
      const GrabMaps = await import(
        'https://maps.grab.com/developer/assets/js/grabmaps.es.js'
      );
      window.GrabMaps = GrabMaps;
      window.grabSdkReady = true;
      window.dispatchEvent(new Event('grabmaps-ready'));
    } catch (error) {
      window.grabSdkReady = false;
      window.grabMapError = error?.message || String(error);
      console.error('GrabMaps SDK failed to load:', error);
    }
  </script>

  <!-- Map bridge functions Flutter will call -->
  <script>
    window.grabMapClient = null;
    window.grabMap = null;
    window.rawMap = null;
    window.mapReady = false;
    window.grabSdkReady = false;
    window.grabMapError = '';
    window.friendPins = [];
    window.resultPins = [];
    window.enableClickToPlace = false;
    window.clickOverlayBound = false;
    window.mapReadyResolvers = [];

    window.getRawMap = function() {
      return window.rawMap;
    };

    window.notifyMapReady = function() {
      window.mapReady = true;
      window.dispatchEvent(new Event('grabmaps-map-ready'));
      const resolvers = window.mapReadyResolvers.splice(0);
      resolvers.forEach(resolve => {
        try {
          resolve(window.rawMap);
        } catch (_) {}
      });
    };

    window.waitForMapReady = function() {
      if (window.rawMap) {
        return Promise.resolve(window.rawMap);
      }
      return new Promise(resolve => {
        window.mapReadyResolvers.push(resolve);
      });
    };

    window.fetchGrabStyle = async function(apiKey) {
      const response = await fetch('https://maps.grab.com/api/style.json', {
        headers: {
          'Authorization': `Bearer ${apiKey}`
        }
      });

      if (!response.ok) {
        throw new Error(`Style fetch failed: ${response.status}`);
      }

      return response.json();
    };

    window.initGrabMap = function(apiKey) {
      try {
        window.grabMapError = '';
        if (!window.maplibregl) {
          throw new Error('MapLibre GL JS not loaded.');
        }

        if (window.rawMap) {
          try {
            window.rawMap.remove();
          } catch (_) {}
          window.rawMap = null;
          window.mapReady = false;
        }

        window.fetchGrabStyle(apiKey)
          .then(style => {
            const map = new window.maplibregl.Map({
              container: 'map-container',
              style,
              center: [103.8198, 1.3521],
              zoom: 12,
              attributionControl: true,
            });

            map.addControl(new window.maplibregl.NavigationControl(), 'bottom-right');

            map.on('load', function() {
              window.rawMap = map;
              window.grabMap = {
                getMap: function() { return map; },
                flyTo: function(options) { map.flyTo(options); },
                onReady: function(callback) {
                  if (callback) {
                    callback(map);
                  }
                  return Promise.resolve(map);
                },
              };
              if (window.enableClickToPlace && map.doubleClickZoom) {
                map.doubleClickZoom.disable();
              }
              window.notifyMapReady();
              console.log('Grab map ready');
            });

            map.on('error', function(event) {
              const message = event?.error?.message || 'Map failed to load.';
              window.grabMapError = message;
              console.error('MapLibre map error:', event);
            });
          })
          .catch(error => {
            window.grabMapError = error?.message || String(error);
            console.error('Grab style/map init failed:', error);
          });

        window._setupClickOverlay();
        console.log('Map initialization started');
        return true;
      } catch (e) {
        window.grabMapError = e?.message || String(e);
        console.error('GrabMaps init failed:', e);
        return false;
      }
    };

    // Wire up the transparent overlay div to dispatch grabmaps-click events.
    // Uses pixel-to-lngLat conversion via MapLibre's unproject().
    window._setupClickOverlay = function() {
      const overlay = document.getElementById('click-overlay');
      if (!overlay || window.clickOverlayBound) {
        return;
      }
      window.clickOverlayBound = true;

      overlay.addEventListener('click', function(e) {
        if (!window.enableClickToPlace) return;
        const m = window.getRawMap();
        if (!m) {
          console.warn('getRawMap() returned null on overlay click');
          return;
        }
        // Convert screen pixel to map coordinates
        const rect = overlay.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const lngLat = m.unproject([x, y]);
        window.dispatchEvent(new CustomEvent('grabmaps-click', {
          detail: JSON.stringify({ lat: lngLat.lat, lng: lngLat.lng })
        }));
      });
    };

    window.getGrabMapError = function() {
      return window.grabMapError || '';
    };

    window.flyToLocation = function(lng, lat, zoom) {
      const m = window.getRawMap();
      if (m) m.flyTo({ center: [lng, lat], zoom: zoom || 13 });
    };

    window.addMarker = function(id, lat, lng, color, label) {
      window.waitForMapReady().then(m => {
        if (!m) return;
        window.removeMarker(id);

        const el = document.createElement('div');
        el.id = 'marker-' + id;
        el.style.width = '36px';
        el.style.height = '36px';
        el.style.borderRadius = '50%';
        el.style.backgroundColor = color;
        el.style.border = '3px solid white';
        el.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
        el.style.display = 'flex';
        el.style.alignItems = 'center';
        el.style.justifyContent = 'center';
        el.style.color = 'white';
        el.style.fontWeight = 'bold';
        el.style.fontSize = '14px';
        el.style.cursor = 'pointer';
        el.innerText = label || '';

        const marker = new maplibregl.Marker({ element: el })
          .setLngLat([lng, lat])
          .addTo(m);

        window.friendPins.push({ id, marker });
      });
    };

    window.removeMarker = function(id) {
      const idx = window.friendPins.findIndex(p => p.id === id);
      if (idx !== -1) {
        window.friendPins[idx].marker.remove();
        window.friendPins.splice(idx, 1);
      }
      const ridx = window.resultPins.findIndex(p => p.id === id);
      if (ridx !== -1) {
        window.resultPins[ridx].marker.remove();
        window.resultPins.splice(ridx, 1);
      }
    };

    window.addResultMarker = function(id, lat, lng, color, rank) {
      window.waitForMapReady().then(m => {
        if (!m) return;
        window.removeMarker(id);

        const el = document.createElement('div');
        el.id = 'marker-' + id;
        el.style.width = '28px';
        el.style.height = '28px';
        el.style.borderRadius = '50%';
        el.style.backgroundColor = color;
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 6px rgba(0,0,0,0.25)';
        el.style.display = 'flex';
        el.style.alignItems = 'center';
        el.style.justifyContent = 'center';
        el.style.color = 'white';
        el.style.fontWeight = 'bold';
        el.style.fontSize = '11px';
        el.innerText = rank || '';

        const marker = new maplibregl.Marker({ element: el })
          .setLngLat([lng, lat])
          .addTo(m);

        window.resultPins.push({ id, marker });
      });
    };


    // Receives coordinates as a JSON string (avoids dart:js_interop nested-array issues).
    window.drawRouteLineJson = function(routeId, coordsJson, color, width) {
      const m = window.getRawMap();
      if (!m) {
        console.warn('drawRouteLineJson: map not ready');
        return;
      }

      let coordinates;
      try {
        coordinates = JSON.parse(coordsJson);
      } catch (e) {
        console.warn('drawRouteLineJson: failed to parse coordinates JSON', e);
        return;
      }

      if (!Array.isArray(coordinates) || coordinates.length < 2) {
        console.warn('drawRouteLineJson: fewer than 2 coordinate pairs', { routeId, count: coordinates?.length });
        return;
      }

      console.log('drawRouteLineJson:', routeId,
        'points:', coordinates.length,
        'first:', coordinates[0],
        'last:', coordinates[coordinates.length - 1]);

      try {
        if (m.getLayer(routeId + '-layer')) {
          m.removeLayer(routeId + '-layer');
        }
        if (m.getSource(routeId)) {
          m.removeSource(routeId);
        }

        m.addSource(routeId, {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: { type: 'LineString', coordinates }
          }
        });

        m.addLayer({
          id: routeId + '-layer',
          type: 'line',
          source: routeId,
          layout: { 'line-join': 'round', 'line-cap': 'round' },
          paint: {
            'line-color': color || '#4ade80',
            'line-width': typeof width === 'number' ? width : 4,
            'line-opacity': 0.8
          }
        });
      } catch (e) {
        console.error('drawRouteLineJson: MapLibre error', e);
      }
    };

    window.clearRoutes = function() {
      const m = window.getRawMap();
      if (!m) return;
      const style = m.getStyle();
      if (style && style.layers) {
        style.layers.forEach(layer => {
          if (layer.id.startsWith('route_') && layer.id.endsWith('-layer') && layer.type === 'line') {
            const sourceId = layer.id.replace('-layer', '');
            m.removeLayer(layer.id);
            if (m.getSource(sourceId)) m.removeSource(sourceId);
          }
        });
      }
    };

    window.clearResults = function() {
      window.resultPins.forEach(p => p.marker.remove());
      window.resultPins = [];
      window.clearRoutes();
    };

    window.fitBounds = function(points) {
      const m = window.getRawMap();
      if (!m || !points.length) return;
      const bounds = new maplibregl.LngLatBounds();
      points.forEach(p => bounds.extend([p.lng, p.lat]));
      m.fitBounds(bounds, { padding: 80, maxZoom: 15 });
    };

    window.setClickToPlace = function(enabled) {
      window.enableClickToPlace = enabled;
      const overlay = document.getElementById('click-overlay');
      // Activate/deactivate the transparent overlay
      overlay.style.pointerEvents = enabled ? 'auto' : 'none';

      // Also change cursor on the MapLibre canvas if accessible
      try {
        const m = window.getRawMap();
        if (m && typeof m.getCanvas === 'function') {
          m.getCanvas().style.cursor = enabled ? 'crosshair' : '';
        }
        if (m && m.doubleClickZoom) {
          enabled ? m.doubleClickZoom.disable() : m.doubleClickZoom.enable();
        }
      } catch (_) {}
    };

    // setupClickListener kept for backward compat — overlay handles clicks now
    window.setupClickListener = function() {};
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
